  <text x="44" y="110" font-size="11" fill="#6b6e72">Group · IDR · intercompany eliminated</text>
  <g font-size="12.5" fill="#21201e">
    <text x="44" y="146">Revenue</text><text x="470" y="146" text-anchor="end" font-weight="bold">27.818.400.000</text>
