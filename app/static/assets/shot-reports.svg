    <text x="564" y="116">Marketing</text><rect x="564" y="124" width="190" height="9" rx="4" fill="#e4e4e0"/><rect x="564" y="124" width="122" height="9" rx="4" fill="#27925a"/>
    <text x="564" y="152">Operations</text><rect x="564" y="160" width="190" height="9" rx="4" fill="#e4e4e0"/><rect x="564" y="160" width="160" height="9" rx="4" fill="#b26a00"/>
